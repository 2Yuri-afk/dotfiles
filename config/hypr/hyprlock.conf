# BACKGROUND
background {
    monitor =
    path = screenshot   # supports png, jpg, webp (no animations, though)
    # all these options are taken from hyprland, see https://wiki.hypr.land/Configuring/Variables/#blur for explanations
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 150, 30
    outline_thickness = 2
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Rubik
    placeholder_text = <span foreground="##cdd6f4">Input Password</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 22
    font_family = Rubik
    position = 0, 300
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 95
    font_family = Rubik Bold
    position = 0, 200
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi $USER!
    color = rgba(242, 243, 244, 0.85)
    font_size = 18
    font_family = Rubik Medium
    position = 0, -40
    halign = center
    valign = center
}

# UPTIME
label {
    monitor =
    text = cmd[update:60000] echo "uptime: $(uptime -p | sed -e 's/up //g')"
    color = rgba(242, 243, 244, 0.5)
    font_size = 10
    font_family = Rubik ExtraLight
    position = 0, -220
    halign = center
    valign = center
}